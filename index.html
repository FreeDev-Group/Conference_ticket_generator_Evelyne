<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/logo-mark.svg">
  <link rel="stylesheet" href="style.css">
  <title>Conference ticket generator | Frontend Mentor </title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<img src="assets/images/pattern-squiggly-line-top.svg" class="img-decoration-top" alt="decoration">
<header>
  <div class="logo-container"><img src="assets/images/logo-full.svg" alt="" class="log"></div>
</header>
  <!-- Form starts -->
<main>
  <div class="title-container">
    <h1>Your Journey to Coding Conf 2025 Starts Here!</h1>
    <p>Secure your spot at next year's biggest coding conference.</p>
  </div>
  <div class="form-container">
    <form action="">
      <div>
        <p>Upload Avatar</p>
        <div class="upload-image-wrapper" id="drop-zone">
          <label for=""> 
          <img src="assets/images/icon-upload.svg" alt="">
          <input type="file" id="file-input" accept="image/png, image/jpeg" hidden>
          </label>
          Drag and drop or click to upload
        </div>
        <span><img src="assets/images/icon-info.svg" alt="">Upload your photo (JPG or PNG, max size: 500KB).</span>
      </div>
      
      <label for="fullName">Full Name
      <input type="text" name="fullName" id="fullName">
      </label>
      <label for="email">
        Email Address
        <input type="email" name="email" id="email" placeholder="example@email.com">
        <span><img src="assets/images/icon-info.svg" alt="">Please enter a valid email address</span>
      </label>
      <label for="gitHubUserName">
          GitHub Username
        <input type="text" name="gitHubUserName" id="gitHubUserName" placeholder="@yourusername">
      </label>
      <button type="submit">  Generate My Ticket</button>
    </form>

  </div>
  <picture class="image-decoration-bottom">
    <source media="(width>=1440px)" srcset="assets/images/pattern-squiggly-line-bottom-desktop.svg" sizes="">
    <img src="assets/images/pattern-squiggly-line-bottom-mobile-tablet.svg" alt="">
  </picture>
</main>
  

  

 
  
  




  




  <!-- Form ends -->

  <!-- Generated tickets starts -->

  <!-- Congrats, Full Name! Your ticket is ready. -->
<!-- 
  We've emailed your ticket to Email Address and will send updates in the run up to the event. -->

  <!-- Coding Conf
  Jan 31, 2025 / Austin, TX -->

  <footer>
      <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
        Coded by <a href="#">Your Name Here</a>.
      </div>
   </footer>


</body>
</html>
